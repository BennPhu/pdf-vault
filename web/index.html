<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>PDF Vault</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header class="topbar">
  <div class="brand">
    <img src="logo.png" alt="" class="brand-logo">
    <h1>PDF Vault <span id="version" class="version-chip"></span></h1>
  </div>
  <div class="topbar-actions">
    <button class="btn ghost" id="btn-updates">Check for Updates</button>
    <button class="btn ghost" id="btn-storage" title="Change storage folder">&#9881; Storage</button>
  </div>
</header>

<section class="dropzone" id="dropzone">
  <div class="dropzone-inner">
    <span class="dropzone-icon">&#128229;</span>
    <p><strong>Drop PDFs here</strong></p>
    <p class="muted">or <button class="link-btn" id="btn-browse">click to browse</button></p>
  </div>
</section>

<main class="content">
  <section class="library-pane">
    <div class="pane-header">
      <h2>Library</h2>
      <div class="pane-header-actions">
        <button class="btn ghost small" id="btn-select-all">Select All</button>
        <button class="btn ghost small" id="btn-unselect" hidden>Unselect</button>
      </div>
    </div>
    <div class="card-grid" id="library"></div>
    <div class="empty-state" id="empty-state" hidden>
      <img src="logo.png" alt="PDF Vault mascot" class="mascot">
      <p><strong>Your vault is empty!</strong></p>
      <p class="muted">Drop your first PDF in the vault to get started.</p>
    </div>
  </section>

  <aside class="preview-pane" id="preview-pane">
    <div class="pane-header"><h2>Preview</h2></div>
    <div class="preview-body">
      <div class="preview-placeholder" id="preview-placeholder">
        <p class="muted">Click a PDF to preview it</p>
      </div>
      <img id="preview-img" hidden alt="Page preview">
    </div>
    <div class="preview-nav" id="preview-nav" hidden>
      <button class="btn round" id="prev-page">&#9664;</button>
      <span id="page-label" class="page-chip"></span>
      <button class="btn round" id="next-page">&#9654;</button>
    </div>
  </aside>
</main>

<footer class="actionbar">
  <button class="btn primary" id="btn-merge">Merge Selected</button>
  <button class="btn primary" id="btn-split">Split Selected</button>
  <button class="btn primary" id="btn-individual">Individual Splits</button>
  <button class="btn secondary" id="btn-master">Create Master PDF</button>
  <button class="btn ghost" id="btn-open-folder">Open Library Folder</button>
</footer>

<!-- First-run setup modal -->
<div class="modal-backdrop" id="setup-modal" hidden>
  <div class="modal">
    <img src="logo.png" class="mascot small" alt="">
    <h2>Welcome to PDF Vault!</h2>
    <p class="muted">Where should PDF Vault keep your PDFs?</p>
    <div class="modal-actions">
      <button class="btn primary" id="setup-choose">Choose a Folder&hellip;</button>
      <button class="btn ghost" id="setup-default">Use Default</button>
    </div>
  </div>
</div>

<!-- Split modal (shared by Split Selected / Individual Splits) -->
<div class="modal-backdrop" id="split-modal" hidden>
  <div class="modal wide">
    <h2 id="split-title">Split</h2>
    <div class="split-preview">
      <img id="split-img" alt="Page preview">
    </div>
    <div class="preview-nav">
      <button class="btn round" id="split-prev">&#9664;</button>
      <span id="split-page-label" class="page-chip"></span>
      <button class="btn round" id="split-next">&#9654;</button>
    </div>
    <div class="range-row">
      <label>From page <input type="number" id="split-start" min="1" value="1"></label>
      <label>To page <input type="number" id="split-end" min="1" value="1"></label>
    </div>
    <div class="modal-actions">
      <button class="btn primary" id="split-confirm">Save&hellip;</button>
      <button class="btn ghost" id="split-cancel">Cancel</button>
    </div>
  </div>
</div>

<div class="toast-stack" id="toasts"></div>

<script src="app.js"></script>
</body>
</html>
