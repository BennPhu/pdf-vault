name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pytest pyinstaller
      - name: Run tests
        run: pytest tests/ -v
      - name: Build app bundle
        run: |
          python -m venv .venv
          .venv/bin/pip install -r requirements.txt pyinstaller
          ./build.sh
      - name: Extract checksum
        id: checksum
        run: |
          ZIP=$(ls dist/PDF-Vault-*-macos.zip)
          SHA=$(shasum -a 256 "$ZIP" | awk '{print $1}')
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"
          echo "zip=$ZIP" >> "$GITHUB_OUTPUT"
      - name: Create GitHub Release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          files: ${{ steps.checksum.outputs.zip }}
          body: |
            ## PDF Vault ${{ github.ref_name }}

            ### Install (2 minutes)
            1. Download the `.zip` below and unzip it
            2. Drag **PDF Vault.app** into your **Applications** folder
            3. First launch only: **right-click the app → Open → Open**
               (the build is unsigned; the app is fully open source — see SECURITY.md)

            Already have PDF Vault? It will offer this update automatically.

            ### Verify your download (optional)
            ```
            shasum -a 256 PDF-Vault-*-macos.zip
            ```
            SHA256: ${{ steps.checksum.outputs.sha }}
          generate_release_notes: true
