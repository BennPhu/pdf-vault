name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pytest pyinstaller
      - name: Run tests
        run: pytest tests/ -v
      - name: Build app bundle
        run: |
          python -m venv .venv
          .venv/bin/pip install -r requirements.txt pyinstaller
          ./build.sh
      - name: Extract checksum
        id: checksum
        run: |
          ZIP=$(ls dist/PDF-Vault-*-macos.zip)
          SHA=$(shasum -a 256 "$ZIP" | awk '{print $1}')
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"
          echo "zip=$ZIP" >> "$GITHUB_OUTPUT"
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.checksum.outputs.zip }}
          body: |
            PDF Vault ${{ github.ref_name }}

            Download the zip below, unzip, and drag "PDF Vault.app" to Applications.
            First launch: right-click the app and choose "Open" (unsigned build).

            SHA256: ${{ steps.checksum.outputs.sha }}
          generate_release_notes: true
